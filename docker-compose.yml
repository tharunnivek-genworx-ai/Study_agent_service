services:
  study-agent-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: study-agent-service
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      database_hostname: postgres
      database_port: "5432"
      database_username: studyguru_app
      database_password: dshuf67ewg3wetvf
      database_name: capstone_db
      secret_key: 898ba07181098d8c59249fcccc948ea1d8387c85eb6a9832265e044ef745961c
      algorithm: HS256
      access_token_expire_minutes: "30"
      refresh_token_expire_days: "7"
      cors_origins: "*"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: study-agent-postgres
    environment:
      POSTGRES_USER: studyguru_app
      POSTGRES_PASSWORD: dshuf67ewg3wetvf
      POSTGRES_DB: capstone_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyguru_app -d capstone_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
